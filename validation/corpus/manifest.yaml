# Corpus manifest for the btf2go validation suite. Each entry is
# fetched + built by validation/refresh.sh; never committed.

c_corpus:
  - name: cilium-ebpf-testdata
    source_url: https://github.com/cilium/ebpf.git
    pinned_commit: v0.21.0
    build:
      # cilium/ebpf v0.21.0's testdata Makefile lives at the repo
      # root and orchestrates a Docker-based build. T1 invokes
      # clang on each .c source itself, so no pre-build is needed.
      # T2 uses the pre-built little-endian .elf artifacts already
      # committed under testdata/.
      cmd: ""
      out_pattern: testdata/*-el.elf
    bpf2go_pkg: ciliumtests
    cflags:
      - -O2
    sources:
      - testdata/map_spin_lock.c
      - testdata/variables.c

aya_corpus:
  # aya-rs/book examples — pinned to a specific SHA for reproducibility.
  # Both examples use aya-ebpf from git and require bpf-linker to be
  # on PATH. The RUSTFLAGS env var injects --btf into the bpf-linker
  # invocation so the resulting ELF contains a .BTF section.
  - name: aya-book-xdp-log
    source_url: https://github.com/aya-rs/book.git
    pinned_commit: 3fb1e051fe4c88d24b0616cb447393df3581c21d
    build:
      cmd: >-
        sudo chmod -R a+rw /usr/local/cargo/git /usr/local/cargo/registry 2>/dev/null || true;
        cd examples/xdp-log &&
        RUSTFLAGS="-C link-arg=--btf"
        cargo +nightly build --release -p xdp-log-ebpf
        --target bpfel-unknown-none -Z build-std=core
      out_pattern: examples/xdp-log/target/bpfel-unknown-none/release/xdp-log
  - name: aya-book-tracepoint
    source_url: https://github.com/aya-rs/book.git
    pinned_commit: 3fb1e051fe4c88d24b0616cb447393df3581c21d
    build:
      cmd: >-
        sudo chmod -R a+rw /usr/local/cargo/git /usr/local/cargo/registry 2>/dev/null || true;
        cd examples/tracepoint &&
        RUSTFLAGS="-C link-arg=--btf"
        cargo +nightly build --release -p tracepoint-ebpf
        --target bpfel-unknown-none -Z build-std=core
      out_pattern: examples/tracepoint/target/bpfel-unknown-none/release/tracepoint
