# Debian 13 trixie preseed for the btf2go validation template.
# Served by packer's built-in HTTP server during boot.

# Locale + keyboard
d-i debian-installer/locale         string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network — DHCP + hostname from boot args
d-i netcfg/choose_interface         select auto
d-i netcfg/get_hostname             string btf2go-validation
d-i netcfg/get_domain               string localdomain
d-i netcfg/wireless_wep             string

# Mirror — Debian's main mirror; the template gets generalized so
# this only matters during packer's run.
d-i mirror/country                  string manual
d-i mirror/http/hostname            string deb.debian.org
d-i mirror/http/directory           string /debian
d-i mirror/http/proxy               string

# Accounts — root login disabled, single sudo-capable user named
# `validator`. The password is rotated and the account is removed
# in 99-generalize.sh, so this credential never leaves the build.
d-i passwd/root-login               boolean false
d-i passwd/user-fullname            string validator
d-i passwd/username                 string validator
d-i passwd/user-password            password btf2go-build-temp
d-i passwd/user-password-again      password btf2go-build-temp
d-i user-setup/allow-password-weak  boolean true
d-i user-setup/encrypt-home         boolean false

# Clock + timezone
d-i clock-setup/utc                 boolean true
d-i time/zone                       string Etc/UTC
d-i clock-setup/ntp                 boolean true

# Partitioning — single atomic ext4 root, full disk.
d-i partman-auto/method             string regular
d-i partman-auto/choose_recipe      select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition        select finish
d-i partman/confirm                 boolean true
d-i partman/confirm_nooverwrite     boolean true

# Apt
d-i apt-setup/use_mirror            boolean true
d-i apt-setup/services-select       multiselect security, updates
d-i apt-setup/security_host         string security.debian.org

# Package selection — minimal + ssh + cloud-init + qemu-agent.
# The heavy toolchain (Go/Rust/clang/...) installs in 01-toolchain.sh.
tasksel tasksel/first               multiselect standard, ssh-server
d-i pkgsel/include                  string sudo curl ca-certificates qemu-guest-agent cloud-init
d-i pkgsel/upgrade                  select full-upgrade
popularity-contest popularity-contest/participate boolean false

# GRUB — install onto the only disk.
d-i grub-installer/only_debian      boolean true
d-i grub-installer/with_other_os    boolean true
d-i grub-installer/bootdev          string /dev/sda

# Late command — sudo NOPASSWD for validator (so packer's
# `sudo -S` works, and so 99-generalize.sh can finish the seal).
d-i preseed/late_command string \
    in-target /bin/sh -c 'echo "validator ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/90-validator'; \
    in-target chmod 440 /etc/sudoers.d/90-validator

# Reboot without confirmation when install finishes.
d-i finish-install/reboot_in_progress note
